services:
  plateform-test:
    build:
      context: .
      dockerfile: dockerfile
    image: plateform-test:latest
    container_name: plateform-test
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
